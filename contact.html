<section id="contact" style="padding:60px 20px; background:#f0f0f0;">
  <div class="container" style="max-width:600px; margin:0 auto;">
    <h2 style="text-align:center; margin-bottom:30px;">Get in Touch</h2>
    
    <!-- Success & Error Messages -->
    <div id="form-success" style="display:none; text-align:center; color:green; margin-bottom:15px;">Thank you! Your message has been sent.</div>
    <div id="form-error" style="display:none; text-align:center; color:red; margin-bottom:15px;">Oops! Something went wrong.</div>
    
    <!-- Formspree Form -->
    <form id="contact-form" action="https://formspree.io/f/xwvzzybv" method="POST" style="display:flex; flex-direction:column; gap:15px;">
      <input type="text" name="name" placeholder="Your Name" required style="padding:12px; border-radius:6px; border:1px solid #ccc; font-size:1em;">
      
      <input type="email" name="email" placeholder="Your Email" required style="padding:12px; border-radius:6px; border:1px solid #ccc; font-size:1em;">
      
      <textarea name="message" placeholder="Your Message" required style="padding:12px; border-radius:6px; border:1px solid #ccc; font-size:1em; min-height:120px;"></textarea>
      
      <button type="submit" style="padding:12px; background:#0d6efd; color:#fff; font-weight:600; border:none; border-radius:6px; cursor:pointer;">Send Message</button>
    </form>
  </div>
</section>

<script>
  const form = document.getElementById('contact-form');
  const successMsg = document.getElementById('form-success');
  const errorMsg = document.getElementById('form-error');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    successMsg.style.display = 'none';
    errorMsg.style.display = 'none';

    const formData = new FormData(form);
    const response = await fetch(form.action, {
      method: form.method,
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

    if (response.ok) {
      successMsg.style.display = 'block';
      form.reset();
    } else {
      errorMsg.style.display = 'block';
    }
  });
    </script>
