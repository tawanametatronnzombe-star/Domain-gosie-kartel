<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Gosie Kartel</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family: 'Montserrat', sans-serif;
  background: #121212;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}
.container {
  text-align: center;
  background: #1e1e1e;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  max-width: 500px;
  width: 100%;
}
h1 { color: #0d6efd; margin-bottom: 20px; }
p { margin-bottom: 25px; color: #ccc; }
input {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 1em;
  margin-bottom: 15px;
}
button {
  padding: 12px;
  width: 100%;
  background: #0d6efd;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
button:hover { background: #0b5ed7; transform: scale(1.05); }
.message {
  margin-top: 20px;
  font-weight: 600;
}
</style>
</head>
<body>

<div class="container">
  <h1>Secure Shop Access</h1>
  <p>Enter your secret code to claim your shop ownership:</p>
  <input type="text" id="secretCode" placeholder="Enter secret code"/>
  <button onclick="checkCode()">Claim Access</button>
  <div id="message" class="message"></div>
</div>

<script>
function checkCode() {
  const codeInput = document.getElementById('secretCode').value.trim();
  const message = document.getElementById('message');

  if(codeInput === 'METATRON878'){
    // Open email client manually for you to send
    window.location.href = "mailto:tawanametatronnzombe@gmail.com?subject=Shop-Gosie-Kartel Ownership Claim&body=User has entered the secret code METATRON878";

    message.style.color = '#00FF00';
    message.textContent = "Code verified! Check your email client to send ownership confirmation manually.";
  } else {
    message.style.color = '#FF4C4C';
    message.textContent = "Incorrect code. Try again.";
  }
}
</script>

</body>
</html>
